<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeTracker - Add Person</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>🌟 LifeTracker</h1>
    <p>Add a person and track their life stats</p>
  </header>

  <main>
    <form id="personForm" class="card">
      <input type="text" id="firstName" placeholder="First Name" required>
      <input type="text" id="surname" placeholder="Surname" required>
      <input type="text" id="sa_id" placeholder="SA ID Number (13 digits)" required>
      <button type="submit">💾 Save Person</button>
    </form>

    <div class="link">
      <a href="people.html">📊 View Dashboard</a>
    </div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
